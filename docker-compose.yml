services:
  account-service:
    build:
      context: .
      dockerfile: account_service/Dockerfile
    environment:
      ACCOUNT_DB_PATH: /data/account.db
    ports:
      - "8001:8001"
    volumes:
      - account-data:/data

  event-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      ACCOUNT_SERVICE_URL: http://account-service:8001
      GATEWAY_DB_PATH: /data/gateway.db
    ports:
      - "8000:8000"
    volumes:
      - gateway-data:/data
    depends_on:
      - account-service

volumes:
  account-data:
  gateway-data:
